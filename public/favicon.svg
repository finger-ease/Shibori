      <stop offset="0%" stop-color="#1a4a2e"/>
      <stop offset="100%" stop-color="#0d2818"/>
    </linearGradient>
    <linearGradient id="card" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#5a1a1a"/>
      <stop offset="40%" stop-color="#6b1a1a"/>
      <stop offset="70%" stop-color="#4a1215"/>
      <stop offset="100%" stop-color="#3a0e10"/>
    </linearGradient>
    <linearGradient id="cardShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.08"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
