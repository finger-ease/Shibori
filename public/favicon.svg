<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="felt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e4d32"/>
      <stop offset="100%" stop-color="#0f2a1c"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#922b21"/>
    </linearGradient>
    <clipPath id="roundClip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>

  <!-- Green felt circle -->
  <circle cx="32" cy="32" r="30" fill="url(#felt)"/>

  <g clip-path="url(#roundClip)">
    <!-- Card back (red, flat underneath — visible through peel) -->
    <rect x="16" y="8" width="32" height="48" rx="2.5" fill="url(#cardBack)" opacity="0.5"/>

    <!-- Card face (white, slightly tilted to hint at squeeze) -->
    <g transform="rotate(-3, 32, 32)">
      <rect x="16" y="8" width="32" height="48" rx="2.5" fill="#fff"/>
      <rect x="16" y="8" width="32" height="48" rx="2.5" fill="none" stroke="#d5d0c4" stroke-width="0.7"/>

      <!-- Spade pip (large, centered) -->
      <g transform="translate(32, 30)" fill="#1a1a2e">
        <path d="M0 -10 C0 -10 -9 -1 -9 4 C-9 7.2 -6.5 9 -4 9 C-2 9 -0.8 7.8 0 6.4 C0.8 7.8 2 9 4 9 C6.5 9 9 7.2 9 4 C9 -1 0 -10 0 -10 Z"/>
        <path d="M-1.5 7 L-2.2 12 L2.2 12 L1.5 7 Z"/>
      </g>

      <!-- "A" top-left -->
      <text x="19.5" y="18" font-family="Georgia, 'Times New Roman', serif" font-size="9" font-weight="bold" fill="#1a1a2e">A</text>
      <!-- Mini spade top-left -->
      <g transform="translate(20.5, 20)" fill="#1a1a2e">
        <path d="M0 -3.5 C0 -3.5 -3 -0.3 -3 1.4 C-3 2.5 -2.2 3 -1.3 3 C-0.7 3 -0.3 2.6 0 2.2 C0.3 2.6 0.7 3 1.3 3 C2.2 3 3 2.5 3 1.4 C3 -0.3 0 -3.5 0 -3.5 Z"/>
      </g>
    </g>

    <!-- Peeled corner (bottom-left) — the squeeze reveal -->
    <path d="M16 44 Q16 56 16 56 L30 56 Z" fill="url(#cardBack)"/>
    <path d="M16 44 Q16 56 16 56 L30 56 Z" fill="none" stroke="#7b241c" stroke-width="0.5"/>
    <!-- Curl shadow -->
    <path d="M16 44 L30 56 L25 54 L14 46 Z" fill="#000" opacity="0.15"/>
  </g>

  <!-- Wooden rail ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#5c3d2e" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="28.8" fill="none" stroke="#fff" stroke-width="0.4" opacity="0.1"/>
</svg>
