  <rect x="17" y="11" width="30" height="42" rx="1" fill="none" stroke="#5a2020" stroke-width="0.8" stroke-opacity="0.5" clip-path="url(#cardClip)"/>

  <path d="M42 56 L42 50 Q42 46 46 46 L50 44 Q50 48 46 52 Z" fill="url(#fold)"/>
  <path d="M42 56 L42 50 Q42 46 46 46 L50 44" fill="none" stroke="#2a0a0c" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M43 54 L43 50.5 Q43 47 46.5 47 L49 45.5" fill="none" stroke="#000" stroke-opacity="0.15" stroke-width="2"/>
