    <pattern id="diamond" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#fff" stroke-opacity="0.06" stroke-width="0.6"/>
      <line x1="0" y1="0" x2="8" y2="0" stroke="#fff" stroke-opacity="0.06" stroke-width="0.6"/>
